<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPR Unique - Feelings Expressed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
        @keyframes slow-pan {
            0%, 100% { transform: scale(1.1) translateX(-2%); }
            50% { transform: scale(1.2) translateX(2%); }
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .animate-float-up { animation: float-up linear infinite; }
        .animate-slow-pan { animation: slow-pan 30s infinite ease-in-out; }
        .animate-heartbeat { animation: heartbeat 1.5s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Manual Lucide Component because we are using CDN
        const Icon = ({ name, color, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, color: color }}></i>;
        };

        const App = () => {
            const driveImageId = "12gXDDVunYqA8qv9NEXj-IWjbR8BZ2uap";
            const directLink = `https://drive.google.com/uc?export=view&id=${driveImageId}`;
            
            const [bgImage, setBgImage] = useState(directLink);
            const [showContent, setShowContent] = useState(false);
            const [imgError, setImgError] = useState(false);
            const fileInputRef = useRef(null);

            const quote = {
                tamil: "நீ என்னை முழுமையாக மாற்றவில்லை. ஆனால் நான் வாழ்ந்த வாழ்க்கையை சிறிது அழகாக மாற்றி விட்டாய். அதனால்தான் நீ எனக்கு முக்கியமானவளாகி விட்டாய்.",
                english: "You didn't change me completely, but you made my life beautiful. That is why you are so important to me."
            };

            useEffect(() => {
                const timer = setTimeout(() => setShowContent(true), 800);
                lucide.createIcons();
                return () => clearTimeout(timer);
            }, []);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setBgImage(reader.result);
                        setImgError(false);
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="flex items-center justify-center min-h-screen bg-[#1a0f0a] overflow-hidden p-2">
                    <div className="relative w-full max-w-[400px] aspect-[9/16] bg-black overflow-hidden shadow-[0_0_80px_rgba(0,0,0,0.8)] flex flex-col items-center border-[8px] border-neutral-900 rounded-[3.5rem] ring-1 ring-white/10">
                        
                        {/* Background Layer */}
                        <div className="absolute inset-0 z-0 bg-[#2a1b15]">
                            {!imgError ? (
                                <img src={bgImage} className="w-full h-full object-cover animate-slow-pan" onError={() => setImgError(true)} />
                            ) : (
                                <div className="w-full h-full flex flex-col items-center justify-center p-12 text-center text-amber-200/40">
                                    <Icon name="camera" size={40} className="mb-4 opacity-50" />
                                    <p className="text-xs font-bold uppercase">Image failed to load</p>
                                </div>
                            )}
                            <div className="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-black/60 opacity-80" />
                        </div>

                        {/* Particles */}
                        <div className="absolute inset-0 pointer-events-none z-10">
                            {[...Array(15)].map((_, i) => (
                                <div key={i} className="absolute animate-float-up bg-amber-400/30 rounded-full blur-[1px]"
                                    style={{
                                        left: `${Math.random() * 100}%`,
                                        bottom: `-5%`,
                                        width: `${Math.random() * 5 + 2}px`,
                                        height: `${Math.random() * 5 + 2}px`,
                                        animationDelay: `${Math.random() * 5}s`,
                                        animationDuration: `${Math.random() * 10 + 5}s`
                                    }}
                                />
                            ))}
                        </div>

                        {/* Header */}
                        <div className={`z-20 mt-14 transition-all duration-1000 ${showContent ? 'translate-y-0 opacity-100' : '-translate-y-10 opacity-0'}`}>
                            <div className="relative w-24 h-24 rounded-full border-2 border-amber-400/60 flex flex-col items-center justify-center backdrop-blur-md bg-black/40">
                                <span className="text-2xl font-black text-amber-400 leading-none">HPR</span>
                                <span className="text-[8px] font-bold tracking-[0.3em] text-amber-200/60 uppercase mt-1">Unique</span>
                            </div>
                        </div>

                        {/* Content */}
                        <div className="z-20 flex-1 flex flex-col justify-center items-center px-10 text-center">
                            <div className={`transition-all duration-1000 delay-300 ${showContent ? 'scale-100 opacity-100' : 'scale-90 opacity-0'}`}>
                                <div className="mb-6 flex justify-center space-x-3">
                                    <Icon name="heart" color="#ef4444" className="animate-heartbeat" />
                                    <Icon name="flame" color="#f59e0b" className="animate-pulse" />
                                    <Icon name="heart" color="#ef4444" className="animate-heartbeat" />
                                </div>
                                <h2 className="text-2xl sm:text-3xl font-bold text-white leading-relaxed drop-shadow-lg">
                                    {quote.tamil}
                                </h2>
                                <div className="my-8 h-px w-16 bg-amber-400/40 mx-auto" />
                                <p className="text-xs font-medium text-amber-100/60 italic leading-relaxed">
                                    {quote.english}
                                </p>
                            </div>
                        </div>

                        {/* Button */}
                        <div className={`z-20 w-full p-10 flex flex-col items-center transition-all duration-1000 delay-500 ${showContent ? 'opacity-100' : 'opacity-0'}`}>
                            <button onClick={() => fileInputRef.current.click()} className="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 px-6 py-3 rounded-full text-white text-[10px] font-bold uppercase tracking-widest transition-all">
                                Change Background
                            </button>
                            <div className="mt-4 text-[8px] font-bold text-amber-400/40 uppercase tracking-[0.4em] animate-pulse">Feelings Expressed</div>
                        </div>

                        <input type="file" ref={fileInputRef} onChange={handleImageUpload} accept="image/*" className="hidden" />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
